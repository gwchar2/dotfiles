# Prefix
set -g prefix C-b

# Terminal / colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g xterm-keys on
set -g extended-keys on

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 1000000
set -g escape-time 0
set -g detach-on-destroy off
set -g status-interval 3
set -g status-position top
set -g allow-passthrough on
set -g set-clipboard on

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Splits in current directory
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

is_vim="#{m/r:^[lg]?n?vim?x?(diff)?$|^g?view(diff)?$,#{pane_current_command}}"

# Split panes with Shift-arrows
bind -n S-Up split-window -v -b -c "#{pane_current_path}"
bind -n S-Down split-window -v -c "#{pane_current_path}"
bind -n S-Left split-window -h -b -c "#{pane_current_path}"
bind -n S-Right split-window -h -c "#{pane_current_path}"

# Insert a newline in Codex without sending the prompt
bind -n S-Enter send-keys C-j

# Leave Esc/Esc sequences to the active TUI; remove old clear-input binding.
unbind-key -q -n M-Escape

# Navigate panes with Alt-arrows
bind -n M-Up if-shell "$is_vim" "send-keys M-Up" "select-pane -U"
bind -n M-Down if-shell "$is_vim" "send-keys M-Down" "select-pane -D"
bind -n M-Left if-shell "$is_vim" "send-keys M-Left" "select-pane -L"
bind -n M-Right if-shell "$is_vim" "send-keys M-Right" "select-pane -R"

# Navigate tmux windows with Ctrl-Alt-arrows
bind -n C-M-Up previous-window
bind -n C-M-Down next-window
bind -n C-M-Left previous-window
bind -n C-M-Right next-window

# Resize panes with directional keys
bind -r h resize-pane -U 5
bind -r j resize-pane -D 5
bind -r k resize-pane -L 5
bind -r l resize-pane -R 5

# Maximize / restore pane
bind -r m resize-pane -Z

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi h send -X cursor-up
bind-key -T copy-mode-vi j send -X cursor-down
bind-key -T copy-mode-vi k send -X cursor-left
bind-key -T copy-mode-vi l send -X cursor-right
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Clipboard copy:
# macOS -> pbcopy
# WSL   -> clip.exe
unbind-key -T copy-mode-vi y
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi c send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi c send-keys -X copy-pipe-and-cancel "clip.exe"'

# Paste tmux buffer
bind P paste-buffer

# Mouse:
# - single left-click selects the pane only; it is not forwarded into TUIs
# - left-click drag enters tmux copy mode and selects scrollback text
bind-key -T root MouseDown1Pane select-pane -t =
bind-key -T root MouseDrag1Pane copy-mode -M

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Style
gray_light="#D8DEE9"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"
border_soft="#4C566A"

set -g status-left-length 100
set -g status-right-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g status-right " %Y-%m-%d %H:%M "
set -g window-status-current-format "#[fg=${cyan_soft},bold] * #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, Z,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${border_soft}"
